<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>EtherWorld Platform Tester 3D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js",
          "three/addons/": "/node_modules/three/examples/jsm/"
        }
      }
    </script>

    <link rel="stylesheet" href="/src/styles.css" />
  </head>

  <body>
    <canvas id="scene"></canvas>

    <div id="hud">
      <div class="title">ETHERWORLD PLATFORM TESTER</div>
      <div class="line">WASD : bouger</div>
      <div class="line">SPACE : sauter</div>
      <div class="line">Souris : tourner la caméra</div>
      <div class="line">Clic plateforme : sélectionner</div>
      <div class="line">T : envoyer test au serveur</div>

      <div class="panel">
        <div><strong>FPS:</strong> <span id="fps">0</span></div>
        <div><strong>Position:</strong> <span id="pos">0, 0, 0</span></div>
        <div><strong>Plateforme:</strong> <span id="selected">Aucune</span></div>
        <div><strong>Sol:</strong> <span id="grounded">false</span></div>
      </div>

      <div class="buttons">
        <button id="addPlatform">Ajouter plateforme</button>
        <button id="exportJson">Exporter JSON</button>
        <button id="resetPlayer">Reset joueur</button>
      </div>
    </div>

    <textarea id="exportBox" spellcheck="false" placeholder="Export JSON ici..."></textarea>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
