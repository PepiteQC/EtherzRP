kind = "web"
previewPath = "/"
title = "ETHERWORLD"
version = "1.0.0"
id = "artifacts/etherworld"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22444

[services.development]
run = "pnpm --filter @workspace/etherworld run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/etherworld", "run", "build" ]
publicDir = "artifacts/etherworld/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22444"
BASE_PATH = "/"
