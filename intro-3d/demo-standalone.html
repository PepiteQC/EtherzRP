<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EtherWorld — Intro 3D (Démo)</title>
<style>
  html,body{margin:0;height:100%;background:#05080f;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
  #c{display:block;width:100%;height:100%;}
  #ui{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:center;align-items:center;}
  .vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(3,5,10,.85) 100%);}
  #skip{position:absolute;top:24px;right:28px;pointer-events:auto;background:rgba(255,255,255,.06);
    border:1px solid rgba(0,229,255,.4);color:#bfe9ff;padding:8px 18px;border-radius:999px;font-size:13px;
    letter-spacing:1px;cursor:pointer;backdrop-filter:blur(6px);}
  #title{text-align:center;z-index:2;opacity:0;transform:translateY(24px);filter:blur(8px);
    transition:opacity 1s ease,transform 1s ease,filter 1s ease;}
  #title.show{opacity:1;transform:translateY(0);filter:blur(0);}
  h1{margin:0;font-size:clamp(2.4rem,8vw,6rem);font-weight:800;color:#fff;letter-spacing:.14em;
    text-shadow:0 0 18px rgba(0,229,255,.9),0 0 48px rgba(124,77,255,.6);}
  .sub{margin:6px 0 0;font-size:clamp(.9rem,2.5vw,1.4rem);letter-spacing:.4em;color:#ff2e93;
    text-shadow:0 0 12px rgba(255,46,147,.8);}
  #enter{pointer-events:auto;margin-top:38px;padding:14px 46px;font-size:16px;font-weight:700;
    letter-spacing:.18em;color:#05080f;background:linear-gradient(90deg,#00e5ff,#7c4dff);border:none;
    border-radius:999px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
  #enter:hover{transform:scale(1.06);box-shadow:0 0 30px rgba(0,229,255,.7);}
  #tag{position:absolute;bottom:60px;color:#bfe9ff;font-size:clamp(.9rem,2.5vw,1.3rem);
    letter-spacing:.3em;text-shadow:0 0 10px rgba(0,229,255,.6);opacity:0;}
  #done{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#05080f;color:#bfe9ff;
    flex-direction:column;z-index:50;font-size:18px;letter-spacing:.2em;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="rabbit" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;"></canvas>
<div id="ui" style="z-index:6;position:relative;">
  <div class="vignette"></div>
  <button id="skip">PASSER ▸</button>
  <div id="title">
    <h1>ETHERWORLD</h1>
    <p class="sub">QUÉBEC · RP</p>
    <button id="enter">ENTRER DANS LA VILLE</button>
  </div>
  <p id="tag">QUÉBEC CITY · LA NUIT</p>
</div>
<div id="done"><div>🌆</div><div style="margin-top:16px">Bienvenue dans EtherWorld</div></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.184.0/build/three.module.js';

const TOTAL = 9200;
const start = performance.now();
const NEON = [0x00e5ff,0xff2e93,0x7c4dff,0x00ff9d,0xffb300];
const rand=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);
scene.fog = new THREE.Fog(0x070b14,18,95);

const camera = new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,300);

scene.add(new THREE.AmbientLight(0x2a3a6a,.6));
const dir = new THREE.DirectionalLight(0x4060a0,.5); dir.position.set(20,40,10); scene.add(dir);
const p1=new THREE.PointLight(0x00e5ff,1.5,120); p1.position.set(0,25,0); scene.add(p1);
const p2=new THREE.PointLight(0xff2e93,1,80); p2.position.set(-30,12,-20); scene.add(p2);
const p3=new THREE.PointLight(0x7c4dff,1,80); p3.position.set(30,12,20); scene.add(p3);

// Ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x05080f,roughness:.25,metalness:.7}));
ground.rotation.x=-Math.PI/2; scene.add(ground);
scene.add(new THREE.GridHelper(200,80,0x1b3a5c,0x0c1a2c));

// Buildings
const CITY=14, BLOCK=8, half=(CITY*BLOCK)/2;
const buildings=[];
const boxGeo=new THREE.BoxGeometry(1,1,1);
const buildMat=new THREE.MeshStandardMaterial({color:0x0d1320,roughness:.85,metalness:.25});
const inst=new THREE.InstancedMesh(boxGeo,buildMat,CITY*CITY);
let n=0; const dummy=new THREE.Object3D();
for(let i=0;i<CITY;i++)for(let j=0;j<CITY;j++){
  if(Math.random()>.82) continue;
  const x=i*BLOCK-half+rand(-1,1), z=j*BLOCK-half+rand(-1,1);
  const h=Math.max(3,rand(4,22)*(1-Math.min(1,Math.hypot(x,z)/70)*.5));
  const sx=rand(3,5.5), sz=rand(3,5.5);
  dummy.position.set(x,h/2,z); dummy.scale.set(sx,h,sz); dummy.updateMatrix();
  inst.setMatrixAt(n++,dummy.matrix);
  buildings.push({x,z,sx,sy:h,sz,win:pick(NEON),lit:rand(.25,.7)});
}
inst.count=n; scene.add(inst);

// Windows
const wpos=[],wcol=[],col=new THREE.Color();
buildings.forEach(b=>{
  const floors=Math.max(2,Math.floor(b.sy/1.4)), perRow=Math.max(2,Math.floor(b.sx/1.2));
  for(let f=1;f<floors;f++)for(let w=0;w<perRow;w++){
    if(Math.random()>b.lit) continue;
    const y=(f/floors)*b.sy, off=(w/(perRow-1)-.5)*(b.sx*.8), face=Math.floor(Math.random()*4);
    let x=b.x,z=b.z;
    if(face===0){x=b.x+off;z=b.z+b.sz/2} if(face===1){x=b.x+off;z=b.z-b.sz/2}
    if(face===2){x=b.x+b.sx/2;z=b.z+off} if(face===3){x=b.x-b.sx/2;z=b.z+off}
    wpos.push(x,y,z);
    col.setHex(Math.random()>.82?b.win:0xffd27f); wcol.push(col.r,col.g,col.b);
  }
});
const wgeo=new THREE.BufferGeometry();
wgeo.setAttribute('position',new THREE.Float32BufferAttribute(wpos,3));
wgeo.setAttribute('color',new THREE.Float32BufferAttribute(wcol,3));
const windows=new THREE.Points(wgeo,new THREE.PointsMaterial({size:.42,vertexColors:true,
  transparent:true,opacity:.85,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false}));
scene.add(windows);

// Neon signs
buildings.filter(()=>Math.random()>.6).slice(0,40).forEach(b=>{
  const m=new THREE.Mesh(new THREE.PlaneGeometry(rand(.6,1.6),rand(.3,.8)),
    new THREE.MeshBasicMaterial({color:pick(NEON),transparent:true,opacity:.9,
    side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
  m.position.set(b.x,b.sy+rand(.5,3),b.z); scene.add(m);
});

// Rain
const RC=1800, rp=new Float32Array(RC*3);
for(let i=0;i<RC;i++){rp[i*3]=rand(-60,60);rp[i*3+1]=rand(0,60);rp[i*3+2]=rand(-60,60);}
const rgeo=new THREE.BufferGeometry();
rgeo.setAttribute('position',new THREE.Float32BufferAttribute(rp,3));
const rain=new THREE.Points(rgeo,new THREE.PointsMaterial({size:.08,color:0x9fc7ff,transparent:true,opacity:.35,depthWrite:false}));
scene.add(rain);

// Cars
const cars=[];
function makeCar(z,speed,color){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.6,.5,.8),
    new THREE.MeshStandardMaterial({color:0x10151f,metalness:.6,roughness:.4}));
  g.add(body);
  const light=new THREE.PointLight(color,3,8); light.position.set(speed>0?1:-1,0,0); g.add(light);
  g.position.set(rand(-50,50),.4,z); g.userData={speed}; scene.add(g); cars.push(g);
}
makeCar(6,.5,0xfff3c0); makeCar(-4,-.6,0xff4d4d); makeCar(14,.4,0xfff3c0);

const lerp=(a,b,t)=>a+(b-a)*t;
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const t=Math.min(1,(now-start)/TOTAL);
  const ease=1-Math.pow(1-t,3);
  camera.position.set(Math.sin(ease*Math.PI*.5)*18, lerp(48,9,ease), lerp(60,16,ease));
  camera.lookAt(Math.sin(ease*Math.PI)*6,6,-10);

  // rain
  const pa=rain.geometry.attributes.position;
  for(let i=0;i<RC;i++){let y=pa.getY(i)-.9; if(y<0)y=60; pa.setY(i,y);} pa.needsUpdate=true;
  // windows flicker
  windows.material.opacity=.78+Math.sin(clock.getElapsedTime()*2)*.08;
  // cars
  cars.forEach(c=>{c.position.x+=c.userData.speed; if(c.position.x>60)c.position.x=-60; if(c.position.x<-60)c.position.x=60;});

  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// UI sequence
const tag=document.getElementById('tag');
tag.animate([{opacity:0},{opacity:1},{opacity:1},{opacity:0}],{duration:3000,easing:'ease'});
setTimeout(()=>document.getElementById('title').classList.add('show'), TOTAL-2800);

function finish(){
  document.getElementById('ui').style.transition='opacity .6s'; document.getElementById('ui').style.opacity=0;
  canvas.style.transition='opacity .6s'; canvas.style.opacity=0;
  setTimeout(()=>{document.getElementById('done').style.display='flex';},600);
}
document.getElementById('enter').onclick=finish;
document.getElementById('skip').onclick=finish;

/* ════════════════════════════════════════════════════════════
   LAPIN-FUSÉE (carotte volante) + NUAGES — survole la ville
   Three.js pur, canvas transparent superposé.
   ════════════════════════════════════════════════════════════ */
const M = {
  orange: new THREE.MeshPhongMaterial({color:0xb7513c,flatShading:true}),
  green:  new THREE.MeshPhongMaterial({color:0x379351,flatShading:true}),
  brown:  new THREE.MeshPhongMaterial({color:0x5c2c22,flatShading:true}),
  pink:   new THREE.MeshPhongMaterial({color:0xb1325e,flatShading:true}),
  gray:   new THREE.MeshPhongMaterial({color:0x666666,flatShading:true}),
  clouds: new THREE.MeshPhongMaterial({color:0xeeeeee,flatShading:true}),
  rabbit: new THREE.MeshPhongMaterial({color:0xaaaaaa,flatShading:true}),
};
const ri = Math.floor;
function createCloud(cfg){
  const g=new THREE.Group(), geo=new THREE.SphereGeometry(5,4,6);
  const c1=new THREE.Mesh(geo,M.clouds); c1.scale.set(1,.8,1);
  const c2=c1.clone(); c2.scale.set(.55,.35,1); c2.position.set(5,-1.5,2);
  const c3=c1.clone(); c3.scale.set(.75,.5,1); c3.position.set(-5.5,-2,-1);
  g.add(c1,c2,c3); g.position.set(cfg.x,cfg.y,cfg.z);
  g.userData={speed:cfg.speed}; return g;
}
function createPilot(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(5,5,5),M.rabbit); body.position.set(0,1,4);
  const seat=new THREE.Mesh(new THREE.BoxGeometry(6,1,6),M.brown); seat.position.set(0,-2.5,0); seat.rotation.x=.25; body.add(seat);
  const earGeo=new THREE.BoxGeometry(2,6,.5);
  const epL=new THREE.Object3D(); epL.name='epL'; epL.position.y=2.5; epL.rotation.x=-Math.PI/2.25;
  const earL=new THREE.Mesh(earGeo,M.rabbit); earL.position.set(-1.5,2.5,0);
  const eiL=new THREE.Mesh(earGeo,M.pink); eiL.scale.set(.5,.7,.5); eiL.position.z=.25; earL.add(eiL); epL.add(earL); body.add(epL);
  const epR=new THREE.Object3D(); epR.name='epR'; epR.position.y=2.5; epR.rotation.x=-Math.PI/3;
  const earR=new THREE.Mesh(earGeo,M.rabbit); earR.position.set(1.5,2.5,0);
  const eiR=new THREE.Mesh(earGeo,M.pink); eiR.scale.set(.5,.7,.5); eiR.position.z=.25; earR.add(eiR); epR.add(earR); body.add(epR);
  const eyeGeo=new THREE.BoxGeometry(.5,1,.5);
  const eyeL=new THREE.Mesh(eyeGeo,M.gray); eyeL.name='eyeL'; eyeL.position.set(1,.5,2.5); body.add(eyeL);
  const eyeR=eyeL.clone(); eyeR.name='eyeR'; eyeR.position.x=-1; body.add(eyeR);
  body.add(new THREE.Mesh(new THREE.BoxGeometry(.5,.5,.5),M.pink)).position.set(0,-.5,2.5);
  body.add(new THREE.Mesh(new THREE.BoxGeometry(.25,.25,.5),M.gray)).position.set(0,-1.5,2.5);
  g.add(body); g.rotation.x=1.5; g.position.set(0,7,5); return g;
}
function createCarrot(){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(5,2,25,8),M.orange));
  const wingGeo=new THREE.BoxGeometry(7,7,.5);
  const wR=new THREE.Mesh(wingGeo,M.brown); wR.position.set(6,2,1);
  const wL=wR.clone(); wL.position.x=-6; wL.rotation.y=Math.PI; g.add(wR,wL);
  const leafs=new THREE.Group(); leafs.name='leafs';
  const leafGeo=new THREE.CylinderGeometry(1.5,1,5,4);
  const a=new THREE.Mesh(leafGeo,M.green); a.position.y=16;
  const b=a.clone(); b.position.set(-1.75,15,0); b.rotation.z=.4;
  const c=b.clone(); c.position.x=1.75; c.rotation.z=-.4;
  leafs.add(a,b,c); g.add(leafs);
  g.add(createPilot());
  g.rotation.set(-Math.PI/2,0,Math.PI/2);
  return g;
}
const rCanvas=document.getElementById('rabbit');
const rRenderer=new THREE.WebGLRenderer({canvas:rCanvas,alpha:true,antialias:true});
rRenderer.setClearColor(0x000000,0); rRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
rRenderer.setSize(innerWidth,innerHeight);
const rScene=new THREE.Scene();
const rCam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,1000); rCam.position.set(40,20,100);
rScene.add(new THREE.AmbientLight(0x8888cc,.8));
const rDir=new THREE.DirectionalLight(0xffffff,1); rDir.position.set(30,20,0); rScene.add(rDir);
const carrot=createCarrot(); rScene.add(carrot);
const clouds=[
  createCloud({x:120,y:-5,z:20,speed:40}),
  createCloud({x:200,y:0,z:10,speed:55}),
  createCloud({x:60,y:15,z:-10,speed:48}),
  createCloud({x:-40,y:-15,z:10,speed:62}),
];
clouds.forEach(c=>rScene.add(c));
const rClock=new THREE.Clock();
function rabbitLoop(){
  requestAnimationFrame(rabbitLoop);
  const t=rClock.getElapsedTime(), dt=rClock.getDelta();
  carrot.position.x=Math.sin(t*1.7)*2;
  carrot.position.y=2+Math.sin(t*2.2)*3;
  carrot.rotation.x=-1.62+Math.sin(t*2.2)*.08;
  const lf=carrot.getObjectByName('leafs'); if(lf)lf.rotation.y+=dt*34;
  const eL=carrot.getObjectByName('epL'),eR=carrot.getObjectByName('epR');
  if(eL)eL.rotation.x=-Math.PI/2.25+Math.sin(t*38)*.08;
  if(eR)eR.rotation.x=-Math.PI/3+Math.sin(t*38+1.4)*.08;
  const blink=Math.sin(t*1.2)>.985?.12:1;
  const yL=carrot.getObjectByName('eyeL'),yR=carrot.getObjectByName('eyeR');
  if(yL)yL.scale.y=THREE.MathUtils.lerp(yL.scale.y,blink,.35);
  if(yR)yR.scale.y=THREE.MathUtils.lerp(yR.scale.y,blink,.35);
  clouds.forEach(cl=>{cl.position.x-=cl.userData.speed*dt; if(cl.position.x<-220){cl.position.x=220; cl.position.y=ri(Math.random()*30)-10;}});
  rRenderer.render(rScene,rCam);
}
rabbitLoop();
addEventListener('resize',()=>{
  rCam.aspect=innerWidth/innerHeight; rCam.updateProjectionMatrix();
  rRenderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
